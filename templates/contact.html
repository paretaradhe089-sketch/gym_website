{% extends 'base.html' %}
{% block title %}Contact - Spartan Fitness Zone{% endblock %}

{% block content %}
<section class="page-header">
    <h1>Contact <span>Us</span></h1>
</section>

<section class="section contact-section">
    <div class="contact-info-card glass-card">
        <h3 class="section-heading">Visit Us</h3>
        <p style="color:#ccc; margin-bottom:10px;">📍 E9 - First Floor, Sharma Colony, Jaipur, Rajasthan 302019</p>
        
        <div class="contact-buttons">
            <a href="tel:{{ gym_phone }}" class="btn-contact btn-call">📞 Call Now</a>
            <a href="{{ gym_whatsapp }}" target="_blank" class="btn-contact btn-whatsapp">💬 WhatsApp</a>
            <a href="{{ gym_instagram }}" target="_blank" class="btn-contact btn-instagram">📸 Instagram</a>
        </div>

        <div class="qr-box">
            <h4>Scan to Chat on WhatsApp</h4>
            <img src="https://z-cdn-media.chatglm.cn/files/99c25129-390c-4fde-be92-98ee4fe1138e.jpeg?auth_key=1883349017-e8ab1ca05c3a4dd0bbdba6729cf8113f-0-07485ffb6abe38f9f4da1f2857b2a2ff" alt="WhatsApp QR Code">
        </div>

        <div class="map-box" style="margin-top:20px;">
            <iframe 
                src="https://www.google.com/maps?q=Sharma+Colony,+Nandpuri,+Jaipur,+Rajasthan+302019&output=embed" 
                width="100%" 
                height="250" 
                style="border:0; border-radius:10px;" 
                allowfullscreen="" 
                loading="lazy" 
                referrerpolicy="no-referrer-when-downgrade">
            </iframe>
        </div>
    </div>

    <div class="glass-card">
        <form method="POST" action="{{ url_for('main.contact') }}">
            <h3 class="section-heading">Send Feedback</h3>
            <input type="text" name="name" placeholder="Your Name" required>
            <input type="email" name="email" placeholder="Email (Optional)">
            <textarea name="message" placeholder="Your Message" required rows="4"></textarea>
            <button type="submit" class="btn-primary">Submit</button>
        </form>
    </div>
</section>
{% endblock %}
