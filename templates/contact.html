{% extends 'base.html' %}
{% block title %}Contact - Spartan Fitness Zone{% endblock %}

{% block content %}
<section class="page-header"><h1>Contact <span>Us</span></h1></section>

<section class="section" style="display:grid; grid-template-columns: 1fr 1.5fr; gap:30px;">
    <div class="glass-card">
        <h3 style="color:var(--yellow); margin-bottom:15px; font-family:'Oswald'; text-transform:uppercase;">Visit Us</h3>
        <p style="color:#ccc; margin-bottom:10px;">📍 E9 - First Floor, Sharma Colony, Jaipur, Rajasthan 302019</p>
        <p style="color:#ccc; margin-bottom:10px;">📞 84400 88706</p>
        <p style="color:#ccc;">🕐 Mon-Sat: 5-10am, 4-10pm</p>
    </div>
    <div class="glass-card">
        <form method="POST" action="{{ url_for('main.contact') }}">
            <h3 style="color:var(--yellow); margin-bottom:15px; font-family:'Oswald'; text-transform:uppercase;">Send Feedback</h3>
            <input type="text" name="name" placeholder="Your Name" required>
            <input type="email" name="email" placeholder="Email (Optional)">
            <textarea name="message" placeholder="Your Message" required rows="4"></textarea>
            <button type="submit" class="btn-primary">Submit</button>
        </form>
    </div>
</section>
{% endblock %}
