<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Success | SFZ</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #111; color: #fff; font-family: 'Poppins', sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; }
        .success-card { background: #1a1a1a; padding: 40px; border-radius: 12px; text-align: center; max-width: 450px; width: 90%; border: 1px solid #FFD400; box-shadow: 0 0 30px rgba(255,212,0,0.1); }
        .success-icon { font-size: 60px; color: #FFD400; margin-bottom: 20px; }
        h1 { font-family: 'Oswald'; color: #FFD400; text-transform: uppercase; margin-bottom: 10px; }
        .details { background: #111; padding: 15px; border-radius: 8px; margin: 20px 0; text-align: left; }
        .details p { margin: 5px 0; font-size: 14px; color: #ccc; }
        .details span { color: #fff; font-weight: bold; float: right; }
        .btn { display: block; width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 6px; text-decoration: none; font-weight: 700; text-transform: uppercase; transition: 0.3s; }
        .btn-pdf { background: #FFD400; color: #111; }
        .btn-wa { background: #25D366; color: #111; }
        .btn-call { background: #e74c3c; color: #fff; }
        .btn-home { background: transparent; border: 1px solid #333; color: #888; }
    </style>
</head>
<body>
    <div class="success-card">
        <div class="success-icon">✅</div>
        <h1>Payment Successful!</h1>
        <p>Membership Activated Successfully.</p>
        
        <div class="details">
            <p>Reg ID: <span>{{ reg_id[-8:] }}</span></p>
            <p>Amount Paid: <span>₹{{ user.final_amount }}</span></p>
            <p>Plan: <span>{{ user.plan }}</span></p>
        </div>

        <a href="{{ url_for('main.download_receipt', user_id=reg_id) }}" class="btn btn-pdf">📄 Download Receipt</a>
        <a href="{{ wa_link }}" target="_blank" class="btn btn-wa">💬 WhatsApp Gym</a>
        <a href="tel:{{ gym_phone }}" class="btn btn-call">📞 Contact Gym</a>
        <a href="{{ url_for('main.index') }}" class="btn btn-home">Go Home</a>
    </div>
</body>
</html>
