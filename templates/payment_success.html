<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Success | SFZ</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #111; color: #fff; font-family: 'Poppins', sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; }
        .success-card { background: #1a1a1a; padding: 40px; border-radius: 12px; text-align: center; max-width: 450px; width: 90%; border: 1px solid #FFD400; box-shadow: 0 0 30px rgba(255,212,0,0.1); }
        .success-icon { font-size: 60px; color: #FFD400; margin-bottom: 20px; }
        h1 { font-family: 'Oswald'; color: #FFD400; text-transform: uppercase; margin-bottom: 10px; }
        p { color: #ccc; font-size: 14px; margin-bottom: 25px; line-height: 1.6; }
        .btn { display: block; width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 6px; text-decoration: none; font-weight: 700; text-transform: uppercase; transition: 0.3s; }
        .btn-wa { background: #25D366; color: #111; }
        .btn-wa:hover { background: #1ebe5d; }
        .btn-pdf { background: #FFD400; color: #111; }
        .btn-pdf:hover { background: #e6c100; }
        .btn-home { background: transparent; border: 1px solid #333; color: #888; }
        .reg-id { background: #111; padding: 10px; border-radius: 6px; margin-bottom: 20px; color: #FFD400; font-weight: bold; }
    </style>
</head>
<body>
    <div class="success-card">
        <div class="success-icon">✅</div>
        <h1>Payment Successful!</h1>
        <p>Thank you {{ user.name }} for registering at Spartan Fitness Zone. Your registration is complete.</p>
        
        <div class="reg-id">Reg ID: {{ reg_id[-8:] }}</div>

        <p><strong>Next Step:</strong> Download your PDF receipt as proof of payment.</p>
        
        <a href="{{ url_for('main.download_receipt', user_id=reg_id) }}" class="btn btn-pdf">📄 Download Receipt (PDF)</a>
        <a href="{{ wa_link }}" target="_blank" class="btn btn-wa">💬 Send Receipt to Admin (WhatsApp)</a>
        <a href="{{ url_for('main.index') }}" class="btn btn-home">Back to Home</a>
    </div>
</body>
</html>
