{% extends 'base.html' %}

{% block title %}Register - FlexGym{% endblock %}

{% block content %}

<section class="auth-section">
    <div class="auth-container glass-card">
        <div class="auth-header">
            <h1>Join FlexGym! 💪</h1>
            <p>Naya account banayein - Free!</p>
        </div>
        
        <form method="POST" action="{{ url_for('auth.register') }}" class="auth-form">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" required 
                       placeholder="Aapka poora naam" value="{{ request.form.name }}">
            </div>
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required 
                       placeholder="email@example.com" value="{{ request.form.email }}">
            </div>
            
            <div class="form-group">
                <label for="phone">Phone Number (Optional)</label>
                <input type="tel" id="phone" name="phone" 
                       placeholder="9876543210" pattern="[0-9]{10}" value="{{ request.form.phone }}">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-field">
                    <input type="password" id="password" name="password" required 
                           placeholder="Kam se kam 6 characters">
                    <button type="button" class="toggle-password" onclick="togglePassword('password', this)">👁️</button>
                </div>
            </div>
            
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <div class="password-field">
                    <input type="password" id="confirm_password" name="confirm_password" required 
                           placeholder="Password dubara daalein">
                    <button type="button" class="toggle-password" onclick="togglePassword('confirm_password', this)">👁️</button>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary btn-full">Create Account 🚀</button>
        </form>
        
        <div class="auth-footer">
            <p>Pehle se account hai? <a href="{{ url_for('auth.login') }}">Login karein</a></p>
        </div>
    </div>
</section>

<script>
function togglePassword(id, btn) {
    const input = document.getElementById(id);
    if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = '🙈';
    } else {
        input.type = 'password';
        btn.textContent = '👁️';
    }
}
</script>

{% endblock %}
