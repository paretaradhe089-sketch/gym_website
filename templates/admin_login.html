<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | SFZ</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body style="display:flex; align-items:center; justify-content:center; height:100vh; background:#111;">
    <div class="glass-card" style="width:350px;">
        <h2 style="text-align:center; color:var(--yellow); font-family:'Oswald';">🔒 Admin Login</h2>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash-{{ category }}" style="margin-bottom:15px;">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form method="POST" action="{{ url_for('admin.admin_login') }}">
            <input type="password" name="password" placeholder="Enter Password" required>
            <button type="submit" class="btn-primary">Login</button>
        </form>
    </div>
</body>
</html>
